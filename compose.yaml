services:
  db:
    # postgres:16 plus the pgvector extension for CLIP embeddings
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: picops
      POSTGRES_USER: picops
      POSTGRES_PASSWORD: picops
    ports:
      - "5433:5432"   # exposed for local tooling; app talks over the compose network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picops -d picops"]
      interval: 5s
      timeout: 3s
      retries: 12

  mail:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI for reading dev mail

  ml:
    build: ml
    restart: unless-stopped
    volumes:
      - mlmodels:/models   # CLIP weights cache (~600MB, downloaded once)

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8081:8080"   # 8080 is the legacy app
    environment:
      DB_URL: jdbc:postgresql://db:5432/picops
      DB_USER: picops
      DB_PASSWORD: picops
      MAIL_HOST: mail
      MAIL_PORT: 1025
      ML_URL: http://ml:8000
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started

volumes:
  pgdata:
  mlmodels:
