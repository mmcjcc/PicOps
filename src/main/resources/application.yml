spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/picops}
    username: ${DB_USER:picops}
    password: ${DB_PASSWORD:picops}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB      # 2005 said 3MB; cameras have moved on
      max-request-size: 130MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

picops:
  quota-mb: ${PICOPS_QUOTA_MB:10240}
  base-url: ${PICOPS_BASE_URL:http://localhost:8081}
  mail-from: ${PICOPS_MAIL_FROM:picops@example.com}
  ml:
    url: ${ML_URL:http://localhost:8000}
    enabled: ${PICOPS_ML_ENABLED:true}
    interval-ms: 15000
    face-match-distance: ${PICOPS_FACE_MATCH_DISTANCE:0.55}
