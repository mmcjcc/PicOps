spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/picops}
    username: ${DB_USER:picops}
    password: ${DB_PASSWORD:picops}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 25MB      # 2005 said 3MB; cameras have moved on
      max-request-size: 130MB

server:
  port: 8080

picops:
  quota-mb: ${PICOPS_QUOTA_MB:10240}
