<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${album.title} + ' — PicOps'">Photo — PicOps</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="appbar">
    <a class="brand" th:href="@{/}">
        <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
            <rect x="1" y="3" width="20" height="16" rx="3" fill="var(--accent)"/>
            <circle cx="4.5" cy="6.5" r="1.1" fill="var(--bg)"/><circle cx="4.5" cy="11" r="1.1" fill="var(--bg)"/><circle cx="4.5" cy="15.5" r="1.1" fill="var(--bg)"/>
            <circle cx="17.5" cy="6.5" r="1.1" fill="var(--bg)"/><circle cx="17.5" cy="11" r="1.1" fill="var(--bg)"/><circle cx="17.5" cy="15.5" r="1.1" fill="var(--bg)"/>
            <circle cx="11" cy="11" r="3.4" fill="none" stroke="var(--bg)" stroke-width="1.6"/>
        </svg>
        PicOps
    </a>
    <div class="appbar-right" th:if="${authenticated}">
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button class="btn ghost" type="submit">Sign out</button>
        </form>
        <div class="avatar" th:text="${initials}">TU</div>
    </div>
    <div class="appbar-right" th:if="${!authenticated}">
        <a class="btn ghost" th:href="@{/login}">Sign in</a>
    </div>
</header>

<main class="appmain">
    <div class="toolbar">
        <a class="back" th:href="@{/albums/{id}(id=${album.id})}"
           th:text="'← ' + ${album.title}">← Album</a>
        <div class="spacer"></div>
        <form th:if="${isOwner}" th:action="@{/pictures/{id}/delete(id=${picId})}" method="post"
              style="margin:0" onsubmit="return confirm('Delete this photo?')">
            <button class="btn ghost" type="submit">Delete photo</button>
        </form>
    </div>

    <div class="photonav">
        <a class="btn ghost" th:if="${prevId != null}"
           th:href="@{/pictures/{id}/view(id=${prevId})}">← Previous</a>
        <span th:if="${prevId == null}"></span>
        <a class="btn ghost" th:if="${nextId != null}"
           th:href="@{/pictures/{id}/view(id=${nextId})}">Next →</a>
        <span th:if="${nextId == null}"></span>
    </div>

    <div class="photostage">
        <a th:href="@{/pictures/{id}(id=${picId})}" target="_blank" rel="noopener"
           title="Open full-size image">
            <img th:src="@{/pictures/{id}(id=${picId})}" alt="photo">
        </a>
    </div>
    <p class="photometa" style="margin-top:8px">
        <span th:if="${metaLine}" th:text="${metaLine}"></span>
        <span th:if="${metaLine}"> · </span>click the photo for full size
    </p>
    <p class="photometa" th:if="${locationLine}">
        📍 <span th:text="${locationLine}">Somewhere</span>
        <span style="opacity:.7">— visible only to you</span>
    </p>

    <p class="tagrow" th:if="${tags != null and !tags.isEmpty()}">
        <a class="tagchip" th:each="t : ${tags}" th:href="@{/search(q=${t})}" th:text="${t}">tag</a>
    </p>

    <p class="tagrow" th:if="${faces != null and !faces.isEmpty()}">
        <a class="facechip" th:each="f : ${faces}" th:href="@{/people/{id}(id=${f.personId})}">
            <img th:src="@{/faces/{id}/crop(id=${f.id})}" alt="face">
            <span th:text="${f.personName != null ? f.personName : 'Unnamed'}">Name</span>
        </a>
    </p>

    <details class="metapanel" th:if="${metaMap != null and !metaMap.isEmpty()}">
        <summary th:text="'Full metadata (' + ${metaMap.size()} + ' fields, owner-only)'">Full metadata</summary>
        <div class="metatable-wrap">
            <table class="metatable">
                <tr th:each="e : ${metaMap}">
                    <td th:text="${e.key}">key</td>
                    <td th:text="${e.value}">value</td>
                </tr>
            </table>
        </div>
    </details>

    <section th:if="${similar != null and !similar.isEmpty()}" style="margin-top:22px">
        <h2 style="font-size:16px;font-weight:650;margin:0 0 10px">More like this</h2>
        <div class="photogrid" style="grid-template-columns:repeat(auto-fill,minmax(110px,1fr))">
            <a class="photo" th:each="id : ${similar}" th:href="@{/pictures/{id}/view(id=${id})}">
                <img th:src="@{/pictures/{id}/thumb(id=${id})}" alt="similar" loading="lazy">
            </a>
        </div>
    </section>

    <section class="comments">
        <h2>Comments <span th:if="${!comments.isEmpty()}" th:text="'(' + ${#lists.size(comments)} + ')'"></span></h2>
        <div class="comment" th:each="c : ${comments}">
            <div class="who">
                <b th:text="${c.author}">Someone</b> · <span th:text="${c.when}">now</span>
                <form th:if="${c.canDelete}" th:action="@{/comments/{id}/delete(id=${c.id})}"
                      method="post" style="display:inline;margin:0">
                    <button type="submit" class="linkbtn">delete</button>
                </form>
            </div>
            <p th:text="${c.body}">…</p>
        </div>
        <p class="photometa" th:if="${comments.isEmpty()}">No comments yet.</p>

        <form th:if="${authenticated}" class="commentform"
              th:action="@{/pictures/{id}/comments(id=${picId})}" method="post">
            <input type="text" name="body" maxlength="1000" placeholder="Add a comment…" required>
            <button class="btn" type="submit">Post</button>
        </form>
        <p class="photometa" th:if="${!authenticated}">
            <a th:href="@{/login}">Sign in</a> to comment.
        </p>
    </section>
</main>
</body>
</html>
