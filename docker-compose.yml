services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: PicOps
      POSTGRES_PASSWORD: "!postgres!"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PicOps"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
